<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
<title>Salary Prediction</title>
<style>
body{
font-family: Arial;
text-align:center;
margin-top:100px;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
background-color:green;
color:white;
border:none;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Salary Prediction App</h1>

<p>Enter Years of Experience</p>

<input type="number" id="experience" placeholder="Years of Experience">

<br><br>

<button onclick="predict()">Predict Salary</button>

<div id="result"></div>

<script>
function predict(){

let exp = document.getElementById("experience").value;

fetch("/predict",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
experience: parseFloat(exp)
})
})

.then(response => response.json())
.then(data => {
document.getElementById("result").innerHTML =
"Predicted Salary: " + data.predicted_salary;
});

}
</script>

</body>
</html>
